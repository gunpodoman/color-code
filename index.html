<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>절대색감 - HEX 버전</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --border-color: #333333;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
        }
        .title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .score-board { display: flex; align-items: center; gap: 12px; }
        .score-text { font-size: 20px; font-weight: 700; color: var(--primary); }
        .leaderboard-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: #fbbf24;
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        /* 메인 게임 영역 */
        .game-area {
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }

        .target-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            background-color: #000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .input-panel {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .input-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 12px;
            display: block;
            text-align: center;
        }

        .hex-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0 20px;
            transition: border-color 0.2s;
        }
        
        .hex-input-wrapper:focus-within {
            border-color: var(--primary);
        }

        .hex-prefix {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-sub);
            margin-right: 8px;
        }

        .hex-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            padding: 16px 0;
            outline: none;
            width: 100%;
        }

        .hex-input::placeholder {
            color: #444;
        }

        .action-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }
        .action-btn:hover { background: var(--primary-hover); }
        .action-btn.success { background: var(--success); }

        /* 모달 공통 */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 50;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        /* 결과 모달 */
        .result-title { font-size: 36px; font-weight: 900; color: var(--danger); margin-bottom: 8px; font-style: italic; }
        .result-score { font-size: 48px; font-weight: 900; margin-bottom: 16px; }
        .result-sim { color: var(--primary); font-size: 18px; font-weight: 700; margin-bottom: 24px; }
        
        .diff-bars {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .diff-row { display: flex; flex-direction: column; gap: 4px; }
        .diff-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--text-sub); }
        .bar-bg { height: 12px; background: var(--input-bg); border-radius: 6px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; position: absolute; transition: width 0.5s ease; }
        .bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.2); z-index: 2; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-secondary { background: var(--input-bg); color: var(--text-main); border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-secondary:hover { background: #3a3a3a; }

        /* 랭킹 등록 모달 */
        .reg-input {
            width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border-color);
            color: white; border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: 16px; outline: none;
        }
        .reg-input:focus { border-color: var(--primary); }

        /* 리더보드 모달 */
        .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; width: 100%; max-width: 400px; }
        .lb-title { font-size: 24px; font-weight: 800; }
        .lb-close { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; }
        .lb-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; }
        .lb-item { background: var(--panel-bg); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }
        .lb-rank-name { display: flex; align-items: center; gap: 16px; }
        .lb-rank { width: 24px; font-weight: 800; color: var(--text-sub); text-align: center; }
        .lb-rank.gold { color: #fbbf24; }
        .lb-rank.silver { color: #94a3b8; }
        .lb-rank.bronze { color: #b45309; }
        .lb-name { font-weight: 700; font-size: 16px; }
        .lb-score { font-weight: 800; color: var(--primary); font-size: 18px; }

        /* 보안 밴 스크린 */
        #ban-screen {
            position: fixed; inset: 0; background: #000; z-index: 999999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container" id="game-container">
        <!-- 헤더 -->
        <div class="header">
            <div class="title">절대색감</div>
            <div class="score-board">
                <button class="leaderboard-btn" onclick="showLeaderboard()">
                    <i class="fas fa-trophy"></i>
                </button>
                <div class="score-text"><span id="score-display">0</span> PTS</div>
            </div>
        </div>

        <!-- 메인 게임 -->
        <div class="game-area">
            <div id="target-color" class="target-box"></div>
            
            <div class="input-panel">
                <label class="input-label">HEX 입력</label>
                <div class="hex-input-wrapper">
                    <span class="hex-prefix">#</span>
                    <input type="text" id="hex-input" class="hex-input" maxlength="6" placeholder="000000" autocomplete="off" spellcheck="false" oninput="formatHexInput(this)">
                </div>

                <button id="action-btn" class="action-btn" onclick="handleAction()">정답 확인</button>
            </div>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="result-title">GAME OVER</div>
            <div class="result-score" id="result-score">0 PTS</div>
            <div class="result-sim" id="result-sim">유사도: 0%</div>

            <!-- HEX 비교는 직관적이지 않으므로, 원본처럼 RGB 오차 게이지로 보여줍니다 -->
            <div class="diff-bars" id="result-details">
                <!-- JS에서 채워짐 -->
            </div>

            <div class="btn-group">
                <button class="action-btn" id="btn-register" onclick="openRegister()" style="margin-top:0; display:none;">랭킹 등록하기</button>
                <button class="btn-secondary" onclick="startGame()">다시 도전하기</button>
            </div>
        </div>
    </div>

    <!-- 랭킹 등록 모달 -->
    <div id="register-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">NEW RECORD</div>
            <div style="color: var(--text-sub); margin-bottom: 24px;">최종 점수: <span id="final-score" style="color: #fbbf24; font-weight: 800;"></span> PTS</div>
            
            <input type="text" id="reg-nickname" class="reg-input" placeholder="닉네임 (최대 8자)" maxlength="8">
            <button class="action-btn" id="submit-btn" onclick="submitScore()" style="margin-top:0;">등록하기</button>
            <button class="btn-secondary" onclick="closeRegister()" style="margin-top:12px; background: transparent; padding: 8px; font-size: 14px; color: var(--text-sub);">건너뛰기</button>
        </div>
    </div>

    <!-- 리더보드 모달 -->
    <div id="leaderboard-modal" class="modal-overlay" style="align-items: center; justify-content: flex-start; padding-top: 10vh;">
        <div class="lb-header">
            <div class="lb-title">명예의 전당</div>
            <button class="lb-close" onclick="closeLeaderboard()"><i class="fas fa-times"></i></button>
        </div>
        <div class="lb-list" id="leaderboard-list">
            <!-- JS 렌더링 -->
        </div>
    </div>

    <!-- 강력 밴 화면 (HTML 파괴 후 노출) -->
    <div id="ban-screen">
        <i class="fas fa-ban" style="color: #ef4444; font-size: 64px; margin-bottom: 24px;"></i>
        <h1 style="color: white; font-size: 32px; font-weight: 900; margin-bottom: 12px;">ACCESS DENIED</h1>
        <p style="color: #ef4444; font-weight: bold; margin-bottom: 24px;">비정상적인 접근이 감지되었습니다.</p>
        <p style="color: #64748b; font-size: 12px; font-family: monospace;" id="ban-device-id"></p>
    </div>

    <script>
        const API_URL = "YOUR_GOOGLE_SHEET_MACRO_URL"; 
        
        let targetRgb = { r: 0, g: 0, b: 0 };
        let score = 0;
        let isResultState = false;
        let isFailed = false;
        let questionStartTime = 0;
        let deviceId = "";
        
        // --- 🛡️ 보안 / 매크로 방어 변수 ---
        let inputLogs = []; 
        let isBanned = false; 
        let isBanProcessing = false; 

        window.onload = () => {
            deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'DVC-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('device_id', deviceId);
            }
            if (localStorage.getItem('is_banned') === 'true') {
                isBanned = true;
                enforceBanScreen();
                return;
            }
            startGame();
        };

        // --- 🚨 철벽 방어 로직 ---
        function enforceBanScreen() {
            document.getElementById('game-container').style.display = 'none';
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(m => m.style.display = 'none');
            
            const banScreen = document.getElementById('ban-screen');
            banScreen.style.display = 'flex';
            document.getElementById('ban-device-id').innerText = `Device ID: ${deviceId}`;
        }

        function executeBan() {
            if (isBanned || isBanProcessing) return; 
            isBanProcessing = true;
            isBanned = true;
            localStorage.setItem('is_banned', 'true');
            enforceBanScreen();

            // 리더보드 오염 방지 (-999점 조작 전송)
            if(API_URL !== "YOUR_GOOGLE_SHEET_MACRO_URL") {
                fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ name: "BANNED_LOG", score: -999, device: deviceId, is_cheater: true }) 
                }).catch(e => {});
            }
        }

        // --- 게임 로직 ---
        function formatHexInput(input) {
            if (isBanned) return;
            inputLogs.push(performance.now()); // 키로그 수집 (매크로 감지용)
            // 영문 대문자 변환 및 0-9, A-F 이외 문자 제거
            input.value = input.value.toUpperCase().replace(/[^0-9A-F]/g, '');
        }

        function startGame() {
            if (isBanned) return;
            score = 0;
            document.getElementById('score-display').innerText = score;
            document.getElementById('result-modal').classList.remove('active');
            generateNewColor();
        }

        function generateNewColor() {
            if (isBanned) return;
            isResultState = false;
            isFailed = false;
            inputLogs = [];
            
            targetRgb = {
                r: Math.floor(Math.random() * 256),
                g: Math.floor(Math.random() * 256),
                b: Math.floor(Math.random() * 256)
            };
            
            document.getElementById('target-color').style.backgroundColor = `rgb(${targetRgb.r}, ${targetRgb.g}, ${targetRgb.b})`;
            
            const inputEl = document.getElementById('hex-input');
            inputEl.value = '';
            inputEl.focus();
            
            const btn = document.getElementById('action-btn');
            btn.innerText = '정답 확인';
            btn.className = "action-btn";
            
            questionStartTime = performance.now();
        }

        function hexToRgb(hex) {
            // 자리수가 부족하면 뒤에 0을 붙임 (예: F -> F00000)
            hex = hex.padEnd(6, '0');
            return {
                r: parseInt(hex.substring(0, 2), 16),
                g: parseInt(hex.substring(2, 4), 16),
                b: parseInt(hex.substring(4, 6), 16)
            };
        }

        function handleAction() {
            if (isBanned) return;
            if (isResultState) {
                if (!isFailed) generateNewColor();
            } else {
                checkAnswer();
            }
        }

        function checkAnswer() {
            if (isBanned) return;

            let hexVal = document.getElementById('hex-input').value;
            if (hexVal.length === 0) hexVal = "000000";

            // 🚨 매크로 감지 로직
            if (inputLogs.length >= 2) {
                let intervals = [];
                for (let i = 1; i < inputLogs.length; i++) {
                    intervals.push(inputLogs[i] - inputLogs[i - 1]);
                }
                const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                const variance = intervals.reduce((a, b) => a + Math.pow(b - avgInterval, 2), 0) / intervals.length;
                const timeTaken = performance.now() - questionStartTime;
                
                // 15ms 이하 초인적 속도, 분산 5 이하 기계적 입력, 50ms 이내 서브밋
                if (avgInterval < 15 || (variance < 5 && intervals.length >= 3) || timeTaken < 50) {
                    executeBan(); 
                    return; 
                }
            }

            const userRgb = hexToRgb(hexVal);
            
            const diffR = Math.abs(targetRgb.r - userRgb.r);
            const diffG = Math.abs(targetRgb.g - userRgb.g);
            const diffB = Math.abs(targetRgb.b - userRgb.b);
            const maxDiff = 255 * 3;
            const similarity = Math.max(0, (1 - ((diffR + diffG + diffB) / maxDiff)) * 100);

            // 난이도 기준: 85% 이상 정답 처리 (HEX는 RGB보다 어렵기 때문에 기준 조정 가능)
            let isPassed = similarity >= 85; 

            if (isPassed) {
                score += 5;
                document.getElementById('score-display').innerText = score;
                const btn = document.getElementById('action-btn');
                btn.innerText = '다음 색상';
                btn.className = "action-btn success";
                isFailed = false;
            } else {
                isFailed = true;
                showGameOver(similarity, userRgb);
            }
            
            isResultState = true;
        }

        function showGameOver(sim, userRgb) {
            if (isBanned) return;
            const modal = document.getElementById('result-modal');
            modal.classList.add('active');
            
            document.getElementById('result-sim').innerText = `유사도: ${sim.toFixed(1)}%`;
            document.getElementById('result-score').innerText = `${score} PTS`;
            
            const diffR = userRgb.r - targetRgb.r;
            const diffG = userRgb.g - targetRgb.g;
            const diffB = userRgb.b - targetRgb.b;

            // HEX 버전이라도 오차는 RGB 기준으로 보여주는 것이 직관적입니다.
            document.getElementById('result-details').innerHTML = `
                ${createDiffBar('R', diffR, '#ef4444')}
                ${createDiffBar('G', diffG, '#10b981')}
                ${createDiffBar('B', diffB, '#3b82f6')}
            `;

            const regBtn = document.getElementById('btn-register');
            if(score > 0) {
                regBtn.style.display = 'block';
            } else {
                regBtn.style.display = 'none';
            }
        }

        function createDiffBar(label, diff, color) {
            let width = Math.min(100, Math.abs(diff) / 255 * 100);
            let isNegative = diff < 0;
            let barStyle = isNegative 
                ? `right: 50%; width: ${width}%; background-color: ${color}; border-radius: 6px 0 0 6px;`
                : `left: 50%; width: ${width}%; background-color: ${color}; border-radius: 0 6px 6px 0;`;

            let sign = diff > 0 ? '+' : '';
            let valColor = diff === 0 ? 'var(--text-sub)' : color;

            return `
            <div class="diff-row">
                <div class="diff-label">
                    <span>${label}</span>
                    <span style="color: ${valColor}">${sign}${diff}</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-center"></div>
                    <div class="bar-fill" style="${barStyle}"></div>
                </div>
            </div>`;
        }

        // --- 리더보드 통신 ---
        function openRegister() {
            if (isBanned) return;
            document.getElementById('result-modal').classList.remove('active');
            document.getElementById('register-modal').classList.add('active');
            document.getElementById('final-score').innerText = score;
            document.getElementById('reg-nickname').focus();
        }

        function closeRegister() {
            document.getElementById('register-modal').classList.remove('active');
            startGame();
        }

        function submitScore() {
            if (isBanned) return;
            const nickname = document.getElementById('reg-nickname').value.trim();
            if (!nickname) { alert('닉네임을 입력해주세요!'); return; }
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = '등록 중...';
            btn.disabled = true;
            
            if(API_URL !== "YOUR_GOOGLE_SHEET_MACRO_URL") {
                fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ name: nickname, score: score, device: deviceId, is_cheater: false }) 
                }).then(() => {
                    alert('등록 완료!');
                    document.getElementById('register-modal').classList.remove('active');
                    showLeaderboard();
                }).finally(() => {
                    btn.innerText = '등록하기';
                    btn.disabled = false;
                });
            } else {
                alert('API가 연결되지 않았습니다.');
                closeRegister();
            }
        }

        function showLeaderboard() {
            if (isBanned) return;
            document.getElementById('leaderboard-modal').classList.add('active');
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '<div style="text-align:center; color: var(--text-sub); padding: 40px;">로딩 중...</div>';

            if(API_URL !== "YOUR_GOOGLE_SHEET_MACRO_URL") {
                fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    listEl.innerHTML = '';
                    // 🛑 -999점(밴 유저) 필터링
                    const validData = data.filter(item => item.score >= 0);
                    
                    if (validData.length === 0) {
                        listEl.innerHTML = '<div style="text-align:center; color: var(--text-sub); padding: 40px;">등록된 기록이 없습니다.</div>';
                        return;
                    }

                    validData.slice(0, 10).forEach((item, index) => {
                        let rankClass = "";
                        if (index === 0) rankClass = "gold";
                        else if (index === 1) rankClass = "silver";
                        else if (index === 2) rankClass = "bronze";

                        listEl.innerHTML += `
                            <div class="lb-item">
                                <div class="lb-rank-name">
                                    <div class="lb-rank ${rankClass}">${index + 1}</div>
                                    <div class="lb-name">${item.name}</div>
                                </div>
                                <div class="lb-score">${item.score}</div>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    listEl.innerHTML = '<div style="text-align:center; color: #ef4444; padding: 40px;">데이터를 불러오지 못했습니다.</div>';
                });
            } else {
                listEl.innerHTML = '<div style="text-align:center; color: var(--text-sub); padding: 40px;">API 연결 필요</div>';
            }
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').classList.remove('active');
        }
    </script>
</body>
</html>
