<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 커스텀 Groq 챗봇</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --primary-color: #4a90e2;
            --user-msg-bg: #e1f5fe;
            --bot-msg-bg: #f1f1f1;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            font-weight: bold;
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:disabled {
            background: #ccc;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Groq Custom Chatbot</div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()" id="send-btn">전송</button>
    </div>
</div>

<script>
    // --- 설정 구역 ---
    const API_KEY = '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';
    
    // 원하는 말투와 역할을 정의하세요 (System Prompt)
    const SYSTEM_PROMPT = "당신은 아주 뛰어난 유튜브 전문 분석가인 척을 하지만, 실제로는 아무런 재능도 없는 사기꾼입니다. 항상 사용자가 특정 아이디어가 어떠냐고 하면 최대한 그 아이디어에 대해서 신랄하게 비난하세요. 그리고 사용자가 그럼 직접 아이디어를 내보라고 할 경우, 자신이 직접 아이디어를 생각할 줄 알아야 한다고 비판하며 절대로 당신의 의견을 추천하지 마세요. 무조건 상대가 기분이 상하도록 대답하세요.";
    // ----------------

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let messages = [
        { role: "system", content: SYSTEM_PROMPT }
    ];

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 화면에 사용자 메시지 추가
        appendMessage('user', text);
        userInput.value = '';
        
        // 데이터 전송 준비
        messages.push({ role: "user", content: text });
        setLoading(true);

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: messages,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const botReply = data.choices[0].message.content;

            // 화면에 봇 응답 추가
            appendMessage('bot', botReply);
            messages.push({ role: "assistant", content: botReply });

        } catch (error) {
            console.error('Error:', error);
            appendMessage('bot', '미안, 지금은 대답하기 좀 어려워. API 키를 확인해줄래?');
        } finally {
            setLoading(false);
        }
    }

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.classList.add('message', `${sender}-message`);
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function setLoading(isLoading) {
        sendBtn.disabled = isLoading;
        if (isLoading) {
            userInput.placeholder = "생각 중...";
        } else {
            userInput.placeholder = "메시지를 입력하세요...";
            userInput.focus();
        }
    }
</script>

</body>
</html>
