<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Master - Color Guess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #1a1c4b;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }

        /* 메인 배경 그라데이션 및 원형 얼룩무늬 (이미지 기반 복구) */
        #viewport-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1e225e 0%, #2e3192 100%);
            overflow: hidden;
        }

        /* 큰 원형 패턴 레이어 */
        #viewport-root::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.05) 10%, transparent 10.1%),
                radial-gradient(circle at 85% 15%, rgba(140, 49, 255, 0.1) 0%, rgba(140, 49, 255, 0.1) 15%, transparent 15.1%),
                radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.04) 8%, transparent 8.1%),
                radial-gradient(circle at 80% 80%, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.05) 12%, transparent 12.1%),
                radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.03) 18%, transparent 18.1%);
            background-size: 100% 100%;
            pointer-events: none;
        }

        #top-toolbar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            flex-shrink: 0;
        }

        .main-stage {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            gap: 20px;
            overflow: hidden;
        }

        /* 메인 카드 크기 대폭 확대 및 밀림 방지 */
        .main-card {
            background: white;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            border-radius: 3rem;
            width: 90%;
            max-width: 460px;
            height: auto;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px;
            z-index: 10;
            position: relative;
            transition: transform 0.3s ease;
        }

        .color-box {
            width: 100%;
            flex: 1;
            min-height: 180px;
            max-height: 280px;
            border-radius: 2.5rem;
            margin: 15px 0;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.1);
            border: 8px solid #f8fafc;
        }

        .input-area {
            width: 90%;
            max-width: 460px;
            flex-shrink: 0;
            margin-bottom: 20px;
            z-index: 20;
        }

        /* 키보드 올라왔을 때 카드 축소 */
        .keyboard-active #top-toolbar { height: 0; opacity: 0; overflow: hidden; }
        .keyboard-active .main-stage { justify-content: flex-start; padding-top: 5px; }
        .keyboard-active .main-card { transform: scale(0.85); max-height: 45vh; }
        .keyboard-active .input-area { transform: translateY(-10px); }

        input {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            outline: none !important;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #8c31ff 0%, #7021d7 100%);
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>
    
    <div id="viewport-root">
        <!-- 상단 툴바 -->
        <div id="top-toolbar">
            <div class="flex items-center gap-3 text-white">
                <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/30">
                    <div class="w-5 h-5 bg-white rounded-full"></div>
                </div>
                <div class="flex flex-col">
                    <span class="font-black text-xl leading-none tracking-tight">PIXEL MASTER</span>
                    <span class="text-[10px] font-bold text-white/50 tracking-widest uppercase">Color Trainer</span>
                </div>
            </div>
            <div class="bg-white/10 backdrop-blur-md px-5 py-2 rounded-2xl border border-white/20 text-white shadow-xl">
                <span class="text-[10px] font-bold opacity-60 mr-2 uppercase tracking-tighter">Score</span>
                <span id="score-display" class="font-black text-lg">0</span>
            </div>
        </div>

        <div class="main-stage">
            <!-- 메인 카드 (문제/결과창) -->
            <div id="game-container" class="main-card">
                <div class="text-center w-full">
                    <p class="text-indigo-500 text-[11px] font-extrabold uppercase tracking-[0.3em] mb-1">Target Color</p>
                    <h2 class="text-xl font-black text-slate-900 leading-tight">제시된 컬러의 코드는?</h2>
                </div>

                <div id="target-color-box" class="color-box"></div>

                <!-- 내부 결과창 -->
                <div id="result-panel" class="hidden absolute inset-0 bg-white rounded-[3rem] flex flex-col items-center justify-center p-8 z-30 shadow-2xl">
                    <div id="status-badge" class="text-4xl font-black italic mb-2 tracking-tighter">GREAT!</div>
                    <div id="similarity-text" class="text-slate-900 font-extrabold text-2xl mb-4">유사도: 98.5%</div>
                    
                    <div class="w-full space-y-3 bg-slate-50 p-5 rounded-[2rem] border border-slate-200 mb-5">
                        <div id="diff-analysis"></div>
                    </div>
                    
                    <div class="text-center">
                        <p id="correct-answer-info" class="text-[13px] font-mono font-black text-slate-600 mb-1"></p>
                        <p class="text-[10px] font-bold text-indigo-500 animate-pulse uppercase tracking-widest">TAP ARROW TO NEXT</p>
                    </div>
                </div>

                <div class="w-full text-center py-2">
                    <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Identify the RGB/HEX values</p>
                </div>
            </div>

            <!-- 하단 입력 영역 -->
            <div class="input-area">
                <div class="flex gap-4 items-center">
                    <div class="flex-1 flex gap-2 bg-white/10 backdrop-blur-3xl p-3 rounded-[2.5rem] border border-white/30 shadow-2xl">
                        <div id="ui-rgb" class="flex w-full gap-2">
                            <input type="number" id="input-r" min="0" max="255" placeholder="R" class="w-full py-5 bg-white rounded-2xl text-center font-black text-2xl text-slate-800 shadow-inner" inputmode="numeric">
                            <input type="number" id="input-g" min="0" max="255" placeholder="G" class="w-full py-5 bg-white rounded-2xl text-center font-black text-2xl text-slate-800 shadow-inner" inputmode="numeric">
                            <input type="number" id="input-b" min="0" max="255" placeholder="B" class="w-full py-5 bg-white rounded-2xl text-center font-black text-2xl text-slate-800 shadow-inner" inputmode="numeric">
                        </div>
                        <div id="ui-hex" class="hidden w-full relative">
                            <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 font-black text-2xl">#</span>
                            <input type="text" id="input-hex" maxlength="6" placeholder="FFFFFF" class="w-full py-5 pl-14 bg-white rounded-2xl font-mono text-2xl uppercase font-black text-slate-800 shadow-inner">
                        </div>
                    </div>

                    <button id="action-btn" onclick="handleMainAction()" class="w-24 h-24 shrink-0 btn-gradient text-white rounded-[2.2rem] shadow-xl flex items-center justify-center transition-all active:scale-95 border-b-[10px] border-black/20">
                        <svg id="btn-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>

                <div class="flex justify-center mt-5 gap-10">
                    <button onclick="setMode('rgb')" id="mode-btn-rgb" class="text-sm font-black tracking-widest text-white uppercase border-b-4 border-white pb-1">RGB</button>
                    <button onclick="setMode('hex')" id="mode-btn-hex" class="text-sm font-black tracking-widest text-white/40 uppercase pb-1">HEX</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 오버 레이어 -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl z-[1000] flex items-center justify-center hidden p-8">
        <div class="bg-white rounded-[3.5rem] p-10 max-w-md w-full text-center shadow-2xl relative">
            <div class="absolute top-0 left-0 w-full h-3 btn-gradient"></div>
            
            <h2 class="text-4xl font-black text-slate-900 mb-2 italic uppercase tracking-tighter">GAME OVER</h2>
            <p id="final-score-msg" class="text-indigo-600 font-black mb-8 text-xl underline underline-offset-8 decoration-4 decoration-indigo-100">최종 점수: 0점</p>
            
            <div class="bg-slate-50 rounded-[2.5rem] p-7 border border-slate-100 mb-8 text-left">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">틀린 원인 분석</p>
                <div id="gameover-analysis" class="space-y-3"></div>
            </div>
            
            <button onclick="restartGame()" class="w-full btn-gradient text-white py-6 rounded-[2.5rem] font-black text-2xl shadow-xl active:translate-y-2 transition-all border-b-8 border-black/20">다시 시도하기</button>
        </div>
    </div>

    <script>
        let currentMode = 'rgb';
        let targetColor = { r: 0, g: 0, b: 0 };
        let score = 0;
        let isResultState = false;
        const SIMILARITY_THRESHOLD = 75;

        const viewportRoot = document.getElementById('viewport-root');
        const targetBox = document.getElementById('target-color-box');
        const scoreDisplay = document.getElementById('score-display');
        const btnIcon = document.getElementById('btn-icon');
        const resultPanel = document.getElementById('result-panel');
        const statusBadge = document.getElementById('status-badge');
        const diffAnalysis = document.getElementById('diff-analysis');
        const gameoverAnalysis = document.getElementById('gameover-analysis');
        const correctAnswerInfo = document.getElementById('correct-answer-info');
        const overlay = document.getElementById('overlay');
        const similarityText = document.getElementById('similarity-text');

        const inputR = document.getElementById('input-r');
        const inputG = document.getElementById('input-g');
        const inputB = document.getElementById('input-b');
        const inputHex = document.getElementById('input-hex');

        const syncLayout = () => {
            const vv = window.visualViewport;
            if (!vv) return;
            viewportRoot.style.height = `${vv.height}px`;
            viewportRoot.style.top = `${vv.offsetTop}px`;
            if (vv.height < window.innerHeight * 0.8) {
                document.body.classList.add('keyboard-active');
            } else {
                document.body.classList.remove('keyboard-active');
            }
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncLayout);
            window.visualViewport.addEventListener('scroll', syncLayout);
        }

        window.addEventListener('load', () => {
            generateNewColor();
            setMode('rgb');
            syncLayout();
        });

        function setMode(mode) {
            if(isResultState) return;
            currentMode = mode;
            document.getElementById('ui-rgb').classList.toggle('hidden', mode !== 'rgb');
            document.getElementById('ui-hex').classList.toggle('hidden', mode !== 'hex');
            
            document.getElementById('mode-btn-rgb').className = mode === 'rgb' ? "text-sm font-black tracking-widest text-white uppercase border-b-4 border-white pb-1" : "text-sm font-black tracking-widest text-white/40 uppercase pb-1";
            document.getElementById('mode-btn-hex').className = mode === 'hex' ? "text-sm font-black tracking-widest text-white uppercase border-b-4 border-white pb-1" : "text-sm font-black tracking-widest text-white/40 uppercase pb-1";

            if(mode === 'rgb') inputR.focus();
            else inputHex.focus();
        }

        function generateNewColor() {
            isResultState = false;
            targetColor = {
                r: Math.floor(Math.random() * 256),
                g: Math.floor(Math.random() * 256),
                b: Math.floor(Math.random() * 256)
            };
            targetBox.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;
            resultPanel.classList.add('hidden');
            btnIcon.innerHTML = `<polyline points="9 18 15 12 9 6"></polyline>`;
            
            [inputR, inputG, inputB, inputHex].forEach(el => { el.disabled = false; el.value = ''; });
            if(currentMode === 'rgb') inputR.focus();
            else inputHex.focus();
        }

        function handleMainAction() {
            if (isResultState) generateNewColor();
            else checkAnswer();
        }

        function checkAnswer() {
            let userRgb;
            if(currentMode === 'rgb') {
                userRgb = {
                    r: parseInt(inputR.value) || 0,
                    g: parseInt(inputG.value) || 0,
                    b: parseInt(inputB.value) || 0
                };
            } else {
                const hex = inputHex.value;
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                userRgb = result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            if(!userRgb) {
                const container = document.getElementById('game-container');
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
                return;
            }

            const distance = Math.sqrt(
                Math.pow(targetColor.r - userRgb.r, 2) +
                Math.pow(targetColor.g - userRgb.g, 2) +
                Math.pow(targetColor.b - userRgb.b, 2)
            );
            const similarity = Math.max(0, 100 - (distance / 441.67 * 100));
            const analysisHTML = generateAnalysisHTML(userRgb);
            
            if(similarity < SIMILARITY_THRESHOLD) gameOver(similarity, analysisHTML);
            else showResult(similarity, analysisHTML);
        }

        function generateAnalysisHTML(userRgb) {
            const channels = [
                { name: 'RED', target: targetColor.r, user: userRgb.r, color: 'bg-red-500' },
                { name: 'GREEN', target: targetColor.g, user: userRgb.g, color: 'bg-green-500' },
                { name: 'BLUE', target: targetColor.b, user: userRgb.b, color: 'bg-blue-500' }
            ];

            return channels.map(c => {
                const diff = c.user - c.target;
                const diffText = diff === 0 ? 'MATCH' : (diff > 0 ? `+${diff}` : diff);
                const barWidth = Math.min(100, (Math.abs(diff) / 255) * 100);
                return `
                    <div class="mb-3">
                        <div class="flex items-center justify-between font-mono text-sm mb-1.5">
                            <span class="font-black text-slate-800">${c.name}</span>
                            <div class="flex gap-4">
                                <span class="text-slate-400 font-bold">정답: ${c.target}</span>
                                <span class="font-black ${diff === 0 ? 'text-emerald-500' : 'text-indigo-600'}">${diffText}</span>
                            </div>
                        </div>
                        <div class="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden">
                            <div class="${c.color} h-full transition-all duration-700" style="width: ${100 - barWidth}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showResult(similarity, analysisHTML) {
            isResultState = true;
            [inputR, inputG, inputB, inputHex].forEach(el => el.disabled = true);
            resultPanel.classList.remove('hidden');
            similarityText.innerText = `유사도: ${similarity.toFixed(1)}%`;
            
            if(similarity >= 96) {
                statusBadge.innerText = "PERFECT!";
                statusBadge.className = "text-4xl font-black italic mb-2 tracking-tighter text-emerald-500";
                score += 15;
            } else if(similarity >= 88) {
                statusBadge.innerText = "GREAT!";
                statusBadge.className = "text-4xl font-black italic mb-2 tracking-tighter text-blue-500";
                score += 7;
            } else {
                statusBadge.innerText = "GOOD!";
                statusBadge.className = "text-4xl font-black italic mb-2 tracking-tighter text-amber-500";
                score += 3;
            }
            scoreDisplay.innerText = score;
            diffAnalysis.innerHTML = analysisHTML;

            const targetHex = `#${targetColor.r.toString(16).padStart(2,'0')}${targetColor.g.toString(16).padStart(2,'0')}${targetColor.b.toString(16).padStart(2,'0')}`.toUpperCase();
            correctAnswerInfo.innerText = `TARGET HEX: ${targetHex}`;
            btnIcon.innerHTML = `<polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline>`;
            document.activeElement.blur();
        }

        function gameOver(similarity, analysisHTML) {
            overlay.classList.remove('hidden');
            document.getElementById('final-score-msg').innerText = `최종 점수: ${score}점`;
            gameoverAnalysis.innerHTML = analysisHTML + `
                <div class="mt-5 pt-5 border-t-2 border-slate-100 text-center">
                    <p class="text-[11px] font-black text-slate-400 mb-1 uppercase tracking-widest">유사도 결과</p>
                    <p class="text-3xl font-black text-red-500">${similarity.toFixed(1)}%</p>
                    <p class="text-[10px] font-bold text-slate-300 mt-2 italic">75% 미만은 게임이 종료됩니다.</p>
                </div>
            `;
            document.activeElement.blur();
        }

        function restartGame() {
            score = 0;
            scoreDisplay.innerText = "0";
            overlay.classList.add('hidden');
            generateNewColor();
        }
    </script>
</body>
</html>
