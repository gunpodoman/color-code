<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Master - Machugi Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #2e3192;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }

        #viewport-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #2e3192;
            overflow: hidden;
            transition: height 0.1s ease-out;
        }

        /* 키보드 활성화 시 상단 툴바 숨김 처리 */
        .keyboard-active #top-toolbar {
            display: none;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
            gap: 10px;
        }

        .main-card {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            /* 세로 공간에 따라 유연하게 줄어듦 */
            max-height: 50vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .keyboard-active .main-card {
            max-height: 40vh; /* 키보드 뜰 때 카드 크기 더 축소 */
            padding: 10px;
        }

        .color-box {
            width: 120px;
            height: 120px;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .keyboard-active .color-box {
            width: 80px;
            height: 80px;
        }

        .input-container {
            width: 90%;
            max-width: 400px;
            z-index: 50;
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        input {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            outline: none !important;
        }
    </style>
</head>
<body>
    
    <div id="viewport-root">
        <!-- 상단 툴바 -->
        <div id="top-toolbar" class="w-full p-4 flex justify-between items-center z-30 shrink-0">
            <div class="flex items-center gap-2 text-white">
                <div class="bg-white p-1 rounded">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#2e3192"><path d="M3 13h1v7c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-7h1a1 1 0 0 0 .707-1.707l-9-9a.999.999 0 0 0-1.414 0l-9 9A1 1 0 0 0 3 13zm7 7v-5h4v5h-4z"></path></svg>
                </div>
                <span class="font-black text-base tracking-tighter">MACHUGI.IO</span>
            </div>
            <div class="bg-white/10 px-3 py-1 rounded-lg border border-white/20 text-white font-bold text-xs">
                SCORE: <span id="score-display">0</span>
            </div>
        </div>

        <div class="content-area">
            <!-- 카드 영역 -->
            <div id="game-container" class="main-card">
                <div id="card-header" class="mb-4 text-center">
                    <p class="text-slate-400 text-[8px] font-bold uppercase tracking-widest mb-0.5">Guess the Color</p>
                    <h2 class="text-sm font-black text-slate-800">이 색상은 무엇일까요?</h2>
                </div>

                <div id="target-color-box" class="color-box shadow-inner border-2 border-slate-100"></div>

                <div id="result-panel" class="hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-center p-4 z-30">
                    <div id="status-badge" class="text-xl font-black italic">PERFECT!</div>
                    <div id="similarity-text" class="text-slate-400 text-xs font-bold mb-2">유사도: 98.5%</div>
                    <div id="diff-analysis" class="w-full space-y-1 bg-slate-50 p-2 rounded-xl border border-slate-100 mb-2"></div>
                    <p id="correct-answer-info" class="text-[8px] font-mono font-bold text-slate-300 uppercase"></p>
                </div>
            </div>

            <!-- 하단 입력창 (키보드 대응을 위해 배치 최적화) -->
            <div class="input-container">
                <div class="flex gap-2 items-center">
                    <div class="flex-1 flex gap-1.5 bg-white p-1.5 rounded-xl shadow-2xl border border-white/20">
                        <div id="ui-rgb" class="flex w-full gap-1">
                            <input type="number" id="input-r" min="0" max="255" placeholder="R" class="w-full py-3 bg-slate-100 rounded-lg text-center font-black text-lg text-slate-700 focus:bg-blue-50" inputmode="numeric">
                            <input type="number" id="input-g" min="0" max="255" placeholder="G" class="w-full py-3 bg-slate-100 rounded-lg text-center font-black text-lg text-slate-700 focus:bg-green-50" inputmode="numeric">
                            <input type="number" id="input-b" min="0" max="255" placeholder="B" class="w-full py-3 bg-slate-100 rounded-lg text-center font-black text-lg text-slate-700 focus:bg-blue-50" inputmode="numeric">
                        </div>
                        <div id="ui-hex" class="hidden w-full relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 font-black text-lg">#</span>
                            <input type="text" id="input-hex" maxlength="6" placeholder="FFFFFF" class="w-full py-3 pl-8 bg-slate-100 rounded-lg font-mono text-lg uppercase font-black text-slate-700">
                        </div>
                    </div>

                    <button id="action-btn" onclick="handleMainAction()" class="w-14 h-14 shrink-0 bg-[#8c31ff] text-white rounded-xl shadow-lg flex items-center justify-center transition-all active:scale-90">
                        <svg id="btn-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>

                <div class="flex justify-center mt-3 gap-6 pb-2">
                    <button onclick="setMode('rgb')" id="mode-btn-rgb" class="text-[9px] font-black tracking-widest text-white uppercase">RGB Mode</button>
                    <button onclick="setMode('hex')" id="mode-btn-hex" class="text-[9px] font-black tracking-widest text-white/40 uppercase">Hex Mode</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 오버 -->
    <div id="overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-50 flex items-center justify-center hidden p-6">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">😵</div>
            <h2 class="text-xl font-black text-slate-900 mb-1 italic uppercase">Game Over</h2>
            <p id="final-score-msg" class="text-slate-400 font-bold mb-6 text-sm">Score: 0</p>
            <button onclick="restartGame()" class="w-full bg-[#8c31ff] text-white py-4 rounded-xl font-black text-lg active:scale-95 transition-transform">RETRY</button>
        </div>
    </div>

    <script>
        let currentMode = 'rgb';
        let targetColor = { r: 0, g: 0, b: 0 };
        let score = 0;
        let isResultState = false;
        const SIMILARITY_THRESHOLD = 70;

        const viewportRoot = document.getElementById('viewport-root');
        const targetBox = document.getElementById('target-color-box');
        const scoreDisplay = document.getElementById('score-display');
        const actionBtn = document.getElementById('action-btn');
        const btnIcon = document.getElementById('btn-icon');
        const resultPanel = document.getElementById('result-panel');
        const statusBadge = document.getElementById('status-badge');
        const diffAnalysis = document.getElementById('diff-analysis');
        const correctAnswerInfo = document.getElementById('correct-answer-info');
        const overlay = document.getElementById('overlay');
        const similarityText = document.getElementById('similarity-text');

        const inputR = document.getElementById('input-r');
        const inputG = document.getElementById('input-g');
        const inputB = document.getElementById('input-b');
        const inputHex = document.getElementById('input-hex');

        // [핵심] 키보드 높이 감지 및 레이아웃 압축 로직
        const handleVisualViewport = () => {
            const vv = window.visualViewport;
            if (!vv) return;

            // 1. 뷰포트 높이 고정 (화면 밀림 방지)
            viewportRoot.style.height = `${vv.height}px`;
            viewportRoot.style.transform = `translateY(${vv.offsetTop}px)`;
            
            // 2. 키보드가 올라온 상태인지 판단 (전체 화면의 80% 미만으로 줄어들면 키보드 활성으로 간주)
            if (vv.height < window.innerHeight * 0.85) {
                document.body.classList.add('keyboard-active');
            } else {
                document.body.classList.remove('keyboard-active');
            }

            window.scrollTo(0, 0);
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleVisualViewport);
            window.visualViewport.addEventListener('scroll', handleVisualViewport);
        }

        // 스크롤 방지
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });

        window.addEventListener('load', () => {
            generateNewColor();
            setMode('rgb');
            handleVisualViewport();
        });

        // 엔터키 처리
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleMainAction();
        });

        function setMode(mode) {
            if(isResultState) return;
            currentMode = mode;
            document.getElementById('ui-rgb').classList.toggle('hidden', mode !== 'rgb');
            document.getElementById('ui-hex').classList.toggle('hidden', mode !== 'hex');
            
            document.getElementById('mode-btn-rgb').style.opacity = mode === 'rgb' ? "1" : "0.4";
            document.getElementById('mode-btn-hex').style.opacity = mode === 'hex' ? "1" : "0.4";

            if(mode === 'rgb') inputR.focus();
            else inputHex.focus();
        }

        function generateNewColor() {
            isResultState = false;
            targetColor = {
                r: Math.floor(Math.random() * 256),
                g: Math.floor(Math.random() * 256),
                b: Math.floor(Math.random() * 256)
            };
            targetBox.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;
            resultPanel.classList.add('hidden');
            btnIcon.innerHTML = `<polyline points="9 18 15 12 9 6"></polyline>`;
            
            [inputR, inputG, inputB, inputHex].forEach(el => {
                el.disabled = false;
                el.value = '';
            });
            
            if(currentMode === 'rgb') inputR.focus();
            else inputHex.focus();
        }

        function handleMainAction() {
            if (isResultState) generateNewColor();
            else checkAnswer();
        }

        function checkAnswer() {
            let userRgb;
            if(currentMode === 'rgb') {
                userRgb = {
                    r: parseInt(inputR.value) || 0,
                    g: parseInt(inputG.value) || 0,
                    b: parseInt(inputB.value) || 0
                };
            } else {
                const hex = inputHex.value;
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                userRgb = result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;

                if(!userRgb) {
                    const container = document.getElementById('game-container');
                    container.classList.add('shake');
                    setTimeout(() => container.classList.remove('shake'), 500);
                    return;
                }
            }

            const distance = Math.sqrt(
                Math.pow(targetColor.r - userRgb.r, 2) +
                Math.pow(targetColor.g - userRgb.g, 2) +
                Math.pow(targetColor.b - userRgb.b, 2)
            );
            const similarity = Math.max(0, 100 - (distance / 441.67 * 100));

            if(similarity < SIMILARITY_THRESHOLD) gameOver();
            else showResult(similarity, userRgb);
        }

        function showResult(similarity, userRgb) {
            isResultState = true;
            [inputR, inputG, inputB, inputHex].forEach(el => el.disabled = true);
            resultPanel.classList.remove('hidden');
            similarityText.innerText = `유사도: ${similarity.toFixed(1)}%`;
            
            if(similarity >= 95) {
                statusBadge.innerText = "PERFECT!";
                statusBadge.style.color = "#10b981";
                score += 10;
            } else if(similarity >= 85) {
                statusBadge.innerText = "GREAT!";
                statusBadge.style.color = "#3b82f6";
                score += 5;
            } else {
                statusBadge.innerText = "GOOD!";
                statusBadge.style.color = "#f59e0b";
                score += 2;
            }
            scoreDisplay.innerText = score;

            const channels = [
                { name: 'R', target: targetColor.r, user: userRgb.r, color: 'text-red-500' },
                { name: 'G', target: targetColor.g, user: userRgb.g, color: 'text-green-500' },
                { name: 'B', target: targetColor.b, user: userRgb.b, color: 'text-blue-500' }
            ];

            diffAnalysis.innerHTML = channels.map(c => {
                const diff = c.user - c.target;
                const diffText = diff === 0 ? 'MATCH' : (diff > 0 ? `+${diff}` : diff);
                return `
                    <div class="flex items-center justify-between font-mono text-[9px]">
                        <span class="font-black ${c.color}">${c.name}</span>
                        <div class="flex gap-2">
                            <span class="text-slate-300">ANS: ${c.target}</span>
                            <span class="font-bold text-slate-700">${diffText}</span>
                        </div>
                    </div>
                `;
            }).join('');

            const targetHex = `#${targetColor.r.toString(16).padStart(2,'0')}${targetColor.g.toString(16).padStart(2,'0')}${targetColor.b.toString(16).padStart(2,'0')}`.toUpperCase();
            correctAnswerInfo.innerText = `TARGET HEX: ${targetHex}`;
            btnIcon.innerHTML = `<polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline>`;
            
            document.activeElement.blur();
        }

        function gameOver() {
            overlay.classList.remove('hidden');
            document.getElementById('final-score-msg').innerText = `Score: ${score}`;
            document.activeElement.blur();
        }

        function restartGame() {
            score = 0;
            scoreDisplay.innerText = "0";
            overlay.classList.add('hidden');
            generateNewColor();
        }
    </script>
</body>
</html>
