<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>절대색감</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e225e;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }

        /* 배경 레이어 - 절대 고정 */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e225e 0%, #2e3192 100%);
            z-index: -1;
        }

        /* 커다란 원형 그라데이션 패턴 */
        #bg-layer::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.05) 10%, transparent 10.1%),
                radial-gradient(circle at 85% 15%, rgba(140, 49, 255, 0.1) 0%, rgba(140, 49, 255, 0.1) 15%, transparent 15.1%),
                radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.04) 8%, transparent 8.1%),
                radial-gradient(circle at 80% 80%, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.05) 12%, transparent 12.1%),
                radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.03) 18%, transparent 18.1%);
            background-size: 100% 100%;
            pointer-events: none;
        }

        #viewport-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        #top-toolbar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            gap: 20px;
            overflow: hidden;
        }

        .main-card {
            background: white;
            border-radius: 2.5rem;
            width: 88%;
            max-width: 400px;
            height: auto;
            max-height: 55vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: none;
        }

        .color-box {
            width: 100%;
            flex: 1;
            min-height: 140px;
            border-radius: 2rem;
            margin: 12px 0;
            border: 6px solid #f8fafc;
            box-shadow: none;
        }

        .input-area {
            width: 88%;
            max-width: 400px;
            flex-shrink: 0;
            margin-bottom: 25px;
        }

        /* 키보드 대응 */
        .keyboard-active #top-toolbar { height: 0; opacity: 0; pointer-events: none; }
        .keyboard-active .main-stage { justify-content: flex-start; padding-top: 20px; }
        .keyboard-active .main-card { transform: scale(0.9); max-height: 38vh; }

        input {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            outline: none !important;
            transition: all 0.2s;
            box-shadow: none !important;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #8c31ff 0%, #7021d7 100%);
        }

        .shake { animation: shake 0.5s both; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 오차값 강조 스타일 */
        .diff-tag {
            font-size: 10px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 6px;
            min-width: 35px;
            text-align: center;
        }
        .diff-plus { background: #fee2e2; color: #ef4444; }
        .diff-minus { background: #dbeafe; color: #3b82f6; }
        .diff-zero { background: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body>
    
    <div id="bg-layer"></div>

    <div id="viewport-root">
        <div id="top-toolbar">
            <div class="flex items-center gap-2 text-white">
                <div class="w-8 h-8 bg-white/20 backdrop-blur-md rounded-lg flex items-center justify-center border border-white/30">
                    <div class="w-4 h-4 bg-white rounded-full"></div>
                </div>
                <span class="font-black text-lg tracking-tight uppercase">절대색감</span>
            </div>
            <div class="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-xl border border-white/20 text-white">
                <span class="text-[9px] font-bold opacity-60 mr-2 uppercase">Score</span>
                <span id="score-display" class="font-black text-base">0</span>
            </div>
        </div>

        <div class="main-stage">
            <div id="game-container" class="main-card">
                <div class="text-center w-full">
                    <p class="text-indigo-500 text-[10px] font-extrabold uppercase tracking-[0.2em] mb-1">Target Color</p>
                    <h2 class="text-lg font-black text-slate-900 leading-tight">색상을 맞춰보세요</h2>
                </div>

                <div id="target-color-box" class="color-box"></div>

                <!-- 결과 레이어 -->
                <div id="result-panel" class="hidden absolute inset-0 bg-white rounded-[2.5rem] flex flex-col items-center justify-center p-6 z-30">
                    <div id="status-badge" class="text-3xl font-black italic mb-1 tracking-tighter">GREAT!</div>
                    <div id="similarity-text" class="text-slate-900 font-extrabold text-xl mb-3">유사도: 98.5%</div>
                    
                    <!-- 정답 분석 영역 -->
                    <div id="diff-analysis" class="w-full space-y-3 bg-slate-50 p-4 rounded-3xl border border-slate-100 mb-4">
                        <!-- JS에서 동적 생성 -->
                    </div>

                    <div class="text-center">
                        <p id="correct-answer-info" class="text-[11px] font-mono font-black text-slate-500 mb-1 uppercase"></p>
                        <p class="text-[10px] font-bold text-indigo-500 animate-pulse uppercase tracking-widest">Press Enter to Next</p>
                    </div>
                </div>

                <div class="w-full text-center">
                    <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Type values & Press Enter</p>
                </div>
            </div>

            <!-- 하단 입력창 -->
            <div class="input-area">
                <div id="ui-rgb" class="flex w-full gap-3">
                    <input type="number" id="input-r" min="0" max="255" placeholder="R" class="w-full py-5 bg-white rounded-[1.5rem] text-center font-black text-2xl text-slate-800 focus:ring-4 focus:ring-white/30" inputmode="numeric">
                    <input type="number" id="input-g" min="0" max="255" placeholder="G" class="w-full py-5 bg-white rounded-[1.5rem] text-center font-black text-2xl text-slate-800 focus:ring-4 focus:ring-white/30" inputmode="numeric">
                    <input type="number" id="input-b" min="0" max="255" placeholder="B" class="w-full py-5 bg-white rounded-[1.5rem] text-center font-black text-2xl text-slate-800 focus:ring-4 focus:ring-white/30" inputmode="numeric">
                </div>
                
                <div id="ui-hex" class="hidden w-full relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 font-black text-2xl">#</span>
                    <input type="text" id="input-hex" maxlength="6" placeholder="FFFFFF" class="w-full py-5 pl-12 bg-white text-slate-800 rounded-[1.5rem] font-mono text-2xl uppercase font-black focus:ring-4 focus:ring-white/30">
                </div>

                <div class="flex justify-center mt-6 gap-10">
                    <button onclick="setMode('rgb')" id="mode-btn-rgb" class="text-[12px] font-black tracking-widest text-white uppercase border-b-4 border-white pb-0.5">RGB</button>
                    <button onclick="setMode('hex')" id="mode-btn-hex" class="text-[12px] font-black tracking-widest text-white/40 uppercase pb-0.5">HEX</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 오버 -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl z-[1000] flex items-center justify-center hidden p-6">
        <div class="bg-white rounded-[3rem] p-8 max-w-sm w-full text-center">
            <h2 class="text-3xl font-black text-slate-900 mb-1 italic">GAME OVER</h2>
            <p id="final-score-msg" class="text-indigo-600 font-black mb-6 text-lg">최종 점수: 0점</p>
            <div id="gameover-analysis" class="space-y-2 mb-6 text-left"></div>
            <button onclick="restartGame()" class="w-full btn-gradient text-white py-5 rounded-[2rem] font-black text-xl active:translate-y-1 border-b-4 border-black/20">RESTART</button>
        </div>
    </div>

    <script>
        let currentMode = 'rgb';
        let targetColor = { r: 0, g: 0, b: 0 };
        let score = 0;
        let isResultState = false;
        const SIMILARITY_THRESHOLD = 75;

        const viewportRoot = document.getElementById('viewport-root');
        const targetBox = document.getElementById('target-color-box');
        const scoreDisplay = document.getElementById('score-display');
        const resultPanel = document.getElementById('result-panel');
        const statusBadge = document.getElementById('status-badge');
        const diffAnalysis = document.getElementById('diff-analysis');
        const gameoverAnalysis = document.getElementById('gameover-analysis');
        const correctAnswerInfo = document.getElementById('correct-answer-info');
        const overlay = document.getElementById('overlay');
        const similarityText = document.getElementById('similarity-text');

        const inputR = document.getElementById('input-r');
        const inputG = document.getElementById('input-g');
        const inputB = document.getElementById('input-b');
        const inputHex = document.getElementById('input-hex');

        const syncLayout = () => {
            const vv = window.visualViewport;
            if (!vv) return;
            viewportRoot.style.height = `${vv.height}px`;
            viewportRoot.style.top = `${vv.offsetTop}px`;
            if (vv.height < window.innerHeight * 0.8) document.body.classList.add('keyboard-active');
            else document.body.classList.remove('keyboard-active');
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncLayout);
            window.visualViewport.addEventListener('scroll', syncLayout);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (overlay.classList.contains('hidden')) {
                    if (isResultState) generateNewColor();
                    else checkAnswer();
                } else {
                    restartGame();
                }
            }
        });

        window.addEventListener('load', () => {
            generateNewColor();
            setMode('rgb');
            syncLayout();
        });

        function setMode(mode) {
            if(isResultState) return;
            currentMode = mode;
            document.getElementById('ui-rgb').classList.toggle('hidden', mode !== 'rgb');
            document.getElementById('ui-hex').classList.toggle('hidden', mode !== 'hex');
            document.getElementById('mode-btn-rgb').className = mode === 'rgb' ? "text-[12px] font-black tracking-widest text-white uppercase border-b-4 border-white pb-0.5" : "text-[12px] font-black tracking-widest text-white/40 uppercase pb-0.5";
            document.getElementById('mode-btn-hex').className = mode === 'hex' ? "text-[12px] font-black tracking-widest text-white uppercase border-b-4 border-white pb-0.5" : "text-[12px] font-black tracking-widest text-white/40 uppercase pb-0.5";
            if (mode === 'rgb') inputR.focus(); else inputHex.focus();
        }

        function generateNewColor() {
            isResultState = false;
            targetColor = {
                r: Math.floor(Math.random() * 256),
                g: Math.floor(Math.random() * 256),
                b: Math.floor(Math.random() * 256)
            };
            targetBox.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;
            resultPanel.classList.add('hidden');
            [inputR, inputG, inputB, inputHex].forEach(el => { el.disabled = false; el.value = ''; });
            if (currentMode === 'rgb') inputR.focus(); else inputHex.focus();
        }

        function checkAnswer() {
            let userRgb;
            if(currentMode === 'rgb') {
                userRgb = {
                    r: parseInt(inputR.value) || 0,
                    g: parseInt(inputG.value) || 0,
                    b: parseInt(inputB.value) || 0
                };
            } else {
                const hex = inputHex.value.trim();
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                userRgb = result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            if(!userRgb && currentMode === 'hex') {
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);
                return;
            }

            const distance = Math.sqrt(
                Math.pow(targetColor.r - userRgb.r, 2) +
                Math.pow(targetColor.g - userRgb.g, 2) +
                Math.pow(targetColor.b - userRgb.b, 2)
            );
            const similarity = Math.max(0, 100 - (distance / 441.67 * 100));
            const analysisHTML = generateAnalysisHTML(userRgb);
            
            if(similarity < SIMILARITY_THRESHOLD) gameOver(similarity, analysisHTML);
            else showResult(similarity, analysisHTML);
        }

        function generateAnalysisHTML(userRgb) {
            const channels = [
                { name: 'R', target: targetColor.r, user: userRgb.r, color: 'bg-red-500' },
                { name: 'G', target: targetColor.g, user: userRgb.g, color: 'bg-green-500' },
                { name: 'B', target: targetColor.b, user: userRgb.b, color: 'bg-blue-500' }
            ];
            return channels.map(c => {
                const diff = c.user - c.target;
                const absDiff = Math.abs(diff);
                const barWidth = Math.max(0, 100 - (absDiff / 255 * 100));
                
                let diffClass = 'diff-zero';
                let diffText = '0';
                if (diff > 0) {
                    diffClass = 'diff-plus';
                    diffText = `+${diff}`;
                } else if (diff < 0) {
                    diffClass = 'diff-minus';
                    diffText = `${diff}`;
                }

                return `
                    <div class="flex items-center gap-3">
                        <span class="w-4 font-black text-[10px] text-slate-400">${c.name}</span>
                        <div class="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                            <div class="${c.color} h-full transition-all duration-700" style="width: ${barWidth}%"></div>
                        </div>
                        <div class="flex items-center gap-2 min-w-[65px] justify-end">
                            <span class="text-[10px] font-black text-slate-800">${c.target}</span>
                            <span class="diff-tag ${diffClass}">${diffText}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showResult(similarity, analysisHTML) {
            isResultState = true;
            [inputR, inputG, inputB, inputHex].forEach(el => el.disabled = true);
            resultPanel.classList.remove('hidden');
            similarityText.innerText = `유사도: ${similarity.toFixed(1)}%`;
            if(similarity >= 96) { statusBadge.innerText = "PERFECT!"; statusBadge.className = "text-3xl font-black italic mb-1 text-emerald-500"; score += 15;
            } else if(similarity >= 88) { statusBadge.innerText = "GREAT!"; statusBadge.className = "text-3xl font-black italic mb-1 text-blue-500"; score += 7;
            } else { statusBadge.innerText = "GOOD!"; statusBadge.className = "text-3xl font-black italic mb-1 text-amber-500"; score += 3; }
            scoreDisplay.innerText = score;
            diffAnalysis.innerHTML = analysisHTML;
            const targetHex = `#${targetColor.r.toString(16).padStart(2,'0')}${targetColor.g.toString(16).padStart(2,'0')}${targetColor.b.toString(16).padStart(2,'0')}`.toUpperCase();
            correctAnswerInfo.innerText = `Answer: ${targetHex}`;
            document.activeElement.blur();
        }

        function gameOver(similarity, analysisHTML) {
            overlay.classList.remove('hidden');
            document.getElementById('final-score-msg').innerText = `최종 점수: ${score}점`;
            gameoverAnalysis.innerHTML = `
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3 text-center">정답과의 오차 분석</p>
                <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                    ${analysisHTML}
                </div>
                <div class="mt-4 pt-4 border-t border-slate-100 text-center">
                    <p class="text-2xl font-black text-red-500">${similarity.toFixed(1)}%</p>
                    <p class="text-[10px] font-bold text-slate-400">75% 이상이어야 통과입니다.</p>
                </div>
            `;
            document.activeElement.blur();
        }

        function restartGame() {
            score = 0;
            scoreDisplay.innerText = "0";
            overlay.classList.add('hidden');
            generateNewColor();
        }
    </script>
</body>
</html>
