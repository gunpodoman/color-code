<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER DUEL 2026: 베테랑 룰링 마스터</title>
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.98);
            --master-blue: #00d4ff;
            --master-gold: #ffcc00;
            --master-red: #ff4d4d;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #101a2b 0%, #05070a 100%);
        }

        #quiz-app {
            width: 95%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid #1a2a40;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--master-blue);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        h1 {
            color: var(--master-blue);
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

       .category {
            font-size: 0.9rem;
            color: var(--master-gold);
            margin-bottom: 8px;
            font-weight: bold;
            display: inline-block;
            border: 1px solid var(--master-gold);
            padding: 2px 10px;
            border-radius: 4px;
        }

       .question-text {
            font-size: 1.25rem;
            line-height: 1.7;
            margin: 25px 0;
            min-height: 100px;
        }

       .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

       .option-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2a3a50;
            color: white;
            padding: 18px 25px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1.05rem;
        }

       .option-btn:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--master-blue);
            transform: translateX(8px);
        }

       .option-btn:disabled {
            cursor: default;
            opacity: 0.6;
        }

       .feedback {
            margin-top: 30px;
            padding: 25px;
            border-radius: 8px;
            display: none;
            border-left: 5px solid;
            background: rgba(255, 255, 255, 0.02);
        }

       .feedback.correct {
            display: block;
            border-color: #00ff64;
            color: #00ff64;
        }

       .feedback.wrong {
            display: block;
            border-color: var(--master-red);
            color: var(--master-red);
        }

       .explanation {
            font-size: 0.95rem;
            color: #bbb;
            margin-top: 12px;
            line-height: 1.6;
        }

       .controls {
            margin-top: 35px;
            display: flex;
            justify-content: flex-end;
        }

       .next-btn {
            background: var(--master-blue);
            color: black;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            font-size: 1rem;
        }

       .progress-bar {
            height: 6px;
            background: #1a2a40;
            margin-bottom: 25px;
            border-radius: 3px;
            overflow: hidden;
        }

       .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0055ff);
            width: 0%;
            transition: width 0.4s ease-out;
        }
    </style>
</head>
<body>

<div id="quiz-app">
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    <header>
        <div id="cat-display" class="category">CATEGORY: LOADING...</div>
        <h1>Master Duel Veteran Evaluation</h1>
    </header>

    <div id="q-area">
        <div id="q-text" class="question-text">데이터를 불러오고 있습니다...</div>
        <div id="options-container" class="options"></div>
    </div>

    <div id="feedback" class="feedback">
        <strong id="result-status" style="font-size: 1.1rem;">RESULT</strong>
        <div id="explanation-text" class="explanation"></div>
    </div>

    <div class="controls">
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">NEXT PHASE</button>
    </div>
</div>

<script>
    // 2026년 한국 공식 명칭(라이제올, 마루챠미 등) 기반 고난도 데이터
    const quizData = [
        {
            cat: "라이제올(Raizeol) 체인 룰링",
            q: "자신 필드에 '라이제올 데드네이더'가 존재합니다. 상대가 카드 효과를 발동했을 때, '라이제올 데드네이더'의 ①번 효과(소재 제거 후 파괴)를 동일 체인 상에서 2번 이상 발동하여 처리할 수 있습니까?",
            options: [
                "가능하다. 이 효과는 명칭 제약이나 한 체인에 1번이라는 제약이 없기 때문이다.",
                "불가능하다. 몬스터의 유발 즉시 효과는 한 체인에 한 번만 발동할 수 있다는 기본 룰이 있다.",
                "불가능하다. 엑시즈 소재를 제거하는 효과는 한 체인에 한 번만 선택 가능하다.",
                "가능하지만, 체인 2에서 발동했다면 체인 4에서만 재발동이 가능하다."
            ],
            ans: 0,
            expl: "'라이제올 데드네이더'의 파괴 효과는 '1턴에 1번'이나 '한 체인에 1번'이라는 제약이 전혀 없습니다. 따라서 엑시즈 소재가 있는 한 동일 체인에서 몇 번이고 발동 가능하며, 이는 라이제올이 티어 1을 차지한 핵심 이유입니다."
        },
        {
            cat: "마루챠미(Mulcharmy) 엔드 페이즈 처리",
            q: "당신은 '마루챠미 푸와로스'의 효과를 발동했습니다. 엔드 페이즈 시점에 당신의 패는 12장이고, 상대 필드에는 '백은의 성의 라비린스' 1장과 세트된 카드 2장이 존재합니다. 이때 당신이 덱으로 되돌려야 하는 패의 장수는?",
            options: [
                "12장 전부 되돌려야 한다.",
                "3장을 되돌려야 한다.",
                "9장을 되돌려야 한다.",
                "상대 필드 카드가 3장이므로 되돌릴 필요가 없다."
            ],
            ans: 1,
            expl: "'마루챠미' 몬스터들의 공통 룰에 따라 엔드 페이즈에 보유 가능한 패는 '상대 필드의 카드 수 + 6장'입니다. 상대 필드에 총 3장의 카드가 있으므로 보유 한도는 9장이며, 12-9=3장을 무작위로 덱으로 되돌려야 합니다."
        },
        {
            cat: "뒷면 표시 이동과 유발 효과",
            q: "엑스트라 덱에서 소환된 몬스터가 '강제 탈출 장치'에 의해 엑스트라 덱으로 되돌아갔습니다. 이때 해당 몬스터가 가진 '필드에서 벗어났을 때' 발동하는 유발 효과의 처리는 어떻게 됩니까?",
            options: [
                "정상적으로 발동하여 체인 블록을 형성한다.",
                "발동 조건은 충족되지만, 뒷면 표시로 되돌아갔으므로 효과는 발동되지 않는다.",
                "공개 정보 상태에서 벗어난 것이므로 상대의 확인 하에만 발동한다.",
                "덱으로 돌아가는 것은 '필드에서 벗어난 것'으로 간주되지 않는다."
            ],
            ans: 1,
            expl: "마스터 룰 2020 개정 이후, 엑스트라 덱이나 메인 덱으로 '뒷면 표시'로 되돌아가는 카드는 '필드에서 벗어났을 때'의 유발 효과를 트리거할 수 없습니다. 이는 정보 초기화 원칙에 따른 베테랑급 상식입니다."
        },
        {
            cat: "라이제올(Raizeol) 보호 효과",
            q: "'라이제올 데드네이더'의 ③번 효과(엑시즈 몬스터가 파괴될 경우 대신 소재 제거)가 적용될 때, 상대가 '신의 통고'를 발동할 수 없는 이유는?",
            options: [
                "이 효과는 데미지 스텝에만 적용되기 때문에.",
                "텍스트에 콜론(:)이나 세미콜론(;)이 없는 지속 효과이므로 체인 블록을 만들지 않기 때문에.",
                "이미 소환된 몬스터의 효과는 카운터 함정으로 막을 수 없기 때문에.",
                "데드네이더 자체가 함정 카드에 대한 완전 내성을 가지고 있기 때문에."
            ],
            ans: 1,
            expl: "유희왕의 PSCT 텍스트 표준에 따라 콜론이나 세미콜론이 없는 효과는 '발동'하지 않는 지속 효과입니다. 데드네이더의 보호 효과는 체인을 만들지 않고 즉시 적용되므로 '발동을 무효로 하는' 카드로는 막을 수 없습니다."
        },
        {
            cat: "미츠루기(Mitsurugi) 릴리스 판정",
            q: "'미츠루기노미코토 아라마사'를 패에서 의식 소환의 소재로 릴리스했습니다. 이때 아라마사의 ①번 효과(소환/릴리스 시 미츠루기 서치)는 어떻게 처리됩니까?",
            options: [
                "패에서 릴리스되었으므로 발동할 수 없다.",
                "의식 소환 성공 후 새로운 체인 블록을 형성하여 유발 효과로 발동한다.",
                "의식 소환과 동시에 처리되므로 체인 블록을 만들지 않는다.",
                "필드에서 릴리스되었을 때만 발동 가능한 제약이 있다."
            ],
            ans: 1,
            expl: "'미츠루기' 하급 몬스터들은 '릴리스되었을 경우'에도 효과가 발동합니다. 의식 소환의 소재가 되는 것은 릴리스에 해당하며, 소환 완료 후 유발 효과로 체인을 형성하여 서치가 가능합니다."
        }
    ];

    let currentIdx = 0;

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('cat-display').innerText = `CATEGORY: ${data.cat}`;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('feedback').className = 'feedback';
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            container.appendChild(btn);
        });

        const progress = (currentIdx / quizData.length) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
    }

    function checkAnswer(selected) {
        const data = quizData[currentIdx];
        const isCorrect = selected === data.ans;
        const feedback = document.getElementById('feedback');
        const status = document.getElementById('result-status');
        const expl = document.getElementById('explanation-text');
        
        feedback.style.display = 'block';
        if(isCorrect) {
            feedback.className = 'feedback correct';
            status.innerText = "✓ CORRECT: 마스터 듀얼 전문가 인증";
        } else {
            feedback.className = 'feedback wrong';
            status.innerText = "✗ FAILED: 룰링 재학습 필요";
        }
        
        expl.innerText = data.expl;
        document.getElementById('next-btn').style.display = 'block';

        const btns = document.getElementsByClassName('option-btn');
        for(let b of btns) b.disabled = true;
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('progress-fill').style.width = `100%`;
            document.getElementById('q-area').innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <h2 style="color:var(--master-gold); margin-bottom:15px;">EVALUATION COMPLETE</h2>
                    <p style="font-size:1.1rem;">2026년 마스터 듀얼의 정점에 도달할 자격을 증명하셨습니다.</p>
                    <p style="color:#888; font-size:0.9rem; margin-top:10px;">반영 명칭: 라이제올, 마루챠미, 미츠루기 등</p>
                    <button class="option-btn" style="text-align:center; margin-top:25px; width: auto; display: inline-block; padding: 12px 40px;" onclick="location.reload()">RE-TRY</button>
                </div>
            `;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }
    }

    window.onload = loadQuestion;
</script>
</body>
</html>
