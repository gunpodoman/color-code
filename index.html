<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>절대색감 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap');
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1e225e;
            font-family: 'Pretendard', sans-serif; touch-action: none;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e225e 0%, #2e3192 100%);
            z-index: -1;
        }

        #viewport-root {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10;
        }

        .main-stage {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            padding: 10px 20px 40px;
        }

        .main-card {
            background: white; border-radius: 3.5rem; width: 100%; max-width: 420px;
            padding: 40px 30px; position: relative; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
            display: flex; flex-direction: column; align-items: center;
        }

        #target-color-box {
            width: 100%; height: 140px; border-radius: 2.5rem;
            margin: 15px 0; border: 10px solid #f8fafc; transition: background-color 0.3s ease;
        }

        /* 결과 패널 */
        .status-text { font-size: 3rem; font-weight: 900; font-style: italic; color: #4f46e5; }
        .similarity-text { font-size: 2.2rem; font-weight: 800; color: #1e293b; margin-bottom: 20px; }

        /* 버튼 스타일 */
        #mobile-action-btn {
            width: 100%; max-width: 420px; padding: 22px 0;
            border-radius: 2rem; color: white; font-weight: 800; font-size: 1.5rem;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
            transition: all 0.2s; cursor: pointer; text-transform: uppercase;
        }
        #mobile-action-btn:active { transform: scale(0.96); }

        input { outline: none !important; -webkit-appearance: none; }
        input:focus { border-color: #6366f1 !important; background: #f5f3ff !important; }
        .hidden { display: none !important; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="bg-layer"></div>

    <div id="viewport-root">
        <div class="h-[60px] flex justify-between items-center px-6">
            <div class="flex items-center gap-2 text-white font-black italic tracking-tighter text-xl cursor-pointer" onclick="location.reload()">COLOR MASTER</div>
            <div class="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-xl border border-white/20 text-white font-black" id="score-display">0</div>
        </div>

        <div class="main-stage">
            <!-- 1. 초기 화면 -->
            <div id="home-view" class="main-card animate-in">
                <h2 class="text-2xl font-black text-slate-900 italic mb-6">RANKING</h2>
                <div id="ranking-list" class="w-full space-y-2 mb-8 min-h-[200px]">
                    <p class="text-center text-slate-300 py-20 font-bold">Loading...</p>
                </div>
                <button onclick="startGame()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-xl">PRESS ENTER TO START</button>
            </div>

            <!-- 2. 게임/결과 화면 -->
            <div id="game-view" class="main-card hidden animate-in">
                <!-- 결과 패널 (직관적 게이지) -->
                <div id="result-panel" class="hidden absolute inset-0 bg-white rounded-[3.5rem] flex flex-col items-center justify-center p-6 z-30">
                    <div id="status-badge" class="status-text">GOOD</div>
                    <div id="similarity-text" class="similarity-text">86.3%</div>
                    
                    <!-- NEW 직관적 게이지 박스 -->
                    <div class="w-full bg-slate-50 rounded-3xl p-5 flex flex-col gap-5 border border-slate-100">
                        <!-- RED -->
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-black text-rose-500 tracking-wider">RED</span>
                                <div class="text-[11px] font-bold text-slate-500 flex items-center">
                                    <span>Target <span id="r-target" class="text-slate-800 ml-0.5">0</span></span>
                                    <span class="mx-2 text-slate-300">|</span>
                                    <span>Yours <span id="r-user" class="text-rose-500 ml-0.5">0</span></span>
                                    <span id="r-diff" class="ml-2 px-1.5 py-0.5 rounded text-[10px]">0</span>
                                </div>
                            </div>
                            <div class="relative w-full h-3 bg-slate-200 rounded-full">
                                <div id="r-bar" class="absolute top-0 left-0 h-full bg-rose-500 rounded-full" style="width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                                <div id="r-marker" class="absolute top-0 w-1.5 h-full bg-slate-900 rounded-full transform -translate-x-1/2 z-10 border border-white" style="left: 0%; transition: left 0.6s ease;"></div>
                            </div>
                        </div>
                        <!-- GREEN -->
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-black text-emerald-500 tracking-wider">GREEN</span>
                                <div class="text-[11px] font-bold text-slate-500 flex items-center">
                                    <span>Target <span id="g-target" class="text-slate-800 ml-0.5">0</span></span>
                                    <span class="mx-2 text-slate-300">|</span>
                                    <span>Yours <span id="g-user" class="text-emerald-500 ml-0.5">0</span></span>
                                    <span id="g-diff" class="ml-2 px-1.5 py-0.5 rounded text-[10px]">0</span>
                                </div>
                            </div>
                            <div class="relative w-full h-3 bg-slate-200 rounded-full">
                                <div id="g-bar" class="absolute top-0 left-0 h-full bg-emerald-500 rounded-full" style="width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                                <div id="g-marker" class="absolute top-0 w-1.5 h-full bg-slate-900 rounded-full transform -translate-x-1/2 z-10 border border-white" style="left: 0%; transition: left 0.6s ease;"></div>
                            </div>
                        </div>
                        <!-- BLUE -->
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-black text-blue-500 tracking-wider">BLUE</span>
                                <div class="text-[11px] font-bold text-slate-500 flex items-center">
                                    <span>Target <span id="b-target" class="text-slate-800 ml-0.5">0</span></span>
                                    <span class="mx-2 text-slate-300">|</span>
                                    <span>Yours <span id="b-user" class="text-blue-500 ml-0.5">0</span></span>
                                    <span id="b-diff" class="ml-2 px-1.5 py-0.5 rounded text-[10px]">0</span>
                                </div>
                            </div>
                            <div class="relative w-full h-3 bg-slate-200 rounded-full">
                                <div id="b-bar" class="absolute top-0 left-0 h-full bg-blue-500 rounded-full" style="width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                                <div id="b-marker" class="absolute top-0 w-1.5 h-full bg-slate-900 rounded-full transform -translate-x-1/2 z-10 border border-white" style="left: 0%; transition: left 0.6s ease;"></div>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mt-6 animate-pulse">Press Enter to continue</p>
                </div>

                <div class="text-center mb-4">
                    <p class="text-indigo-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Challenge</p>
                    <h2 class="text-xl font-black text-slate-900">컬러를 맞춰보세요</h2>
                </div>

                <div id="target-color-box"></div>

                <div class="w-full flex gap-3 mt-4">
                    <input type="number" id="input-r" placeholder="R" class="w-full py-5 bg-slate-50 rounded-2xl text-center font-black text-2xl border-2 border-slate-100" inputmode="numeric">
                    <input type="number" id="input-g" placeholder="G" class="w-full py-5 bg-slate-50 rounded-2xl text-center font-black text-2xl border-2 border-slate-100" inputmode="numeric">
                    <input type="number" id="input-b" placeholder="B" class="w-full py-5 bg-slate-50 rounded-2xl text-center font-black text-2xl border-2 border-slate-100" inputmode="numeric">
                </div>
            </div>

            <button id="mobile-action-btn" class="hidden" onclick="handleActionButton()">CHECK</button>
        </div>
    </div>

    <!-- 3. 종료 화면 -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl z-[1000] flex items-center justify-center hidden p-6">
        <div class="bg-white rounded-[3.5rem] p-10 max-w-sm w-full text-center">
            <h2 class="text-4xl font-black text-slate-900 italic mb-2">FAIL</h2>
            <p id="final-score-msg" class="text-indigo-600 font-black mb-8 text-2xl">0 PTS</p>
            <div id="rank-register-area" class="mb-4 hidden">
                <input type="text" id="user-name" maxlength="8" placeholder="NICKNAME" class="w-full py-4 bg-slate-50 rounded-2xl text-center font-black text-xl mb-3 border-2 border-slate-100">
                <button onclick="submitScore()" id="submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mb-2">REGISTER</button>
            </div>
            <button onclick="location.reload()" class="w-full bg-indigo-100 text-indigo-700 py-4 rounded-2xl font-black text-lg">RETRY</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbykOuF-DPpiMJwEPpic-4RYQk2OAAyMETIP90cnBdZ81QrtbJPceUCV0OwCgwX8RSc7og/exec";
        let targetColor = { r: 0, g: 0, b: 0 };
        let score = 0;
        let gameState = "HOME"; // HOME, PLAY, RESULT, OVER
        let deviceId = "ID-" + Math.random().toString(36).substr(2, 9).toUpperCase();

        function startGame() {
            gameState = "PLAY";
            score = 0;
            document.getElementById('score-display').innerText = "0";
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('mobile-action-btn').classList.remove('hidden');
            generateNewColor();
        }

        function generateNewColor() {
            gameState = "PLAY";
            targetColor = { r: Math.floor(Math.random()*256), g: Math.floor(Math.random()*256), b: Math.floor(Math.random()*256) };
            document.getElementById('target-color-box').style.backgroundColor = `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('mobile-action-btn').innerText = "CHECK";
            ['input-r', 'input-g', 'input-b'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('input-r').focus();
        }

        function handleActionButton() {
            if(gameState === "RESULT") generateNewColor();
            else if(gameState === "PLAY") checkAnswer();
        }

        function checkAnswer() {
            const r = parseInt(document.getElementById('input-r').value) || 0;
            const g = parseInt(document.getElementById('input-g').value) || 0;
            const b = parseInt(document.getElementById('input-b').value) || 0;

            const dist = Math.sqrt(Math.pow(targetColor.r-r,2) + Math.pow(targetColor.g-g,2) + Math.pow(targetColor.b-b,2));
            const similarity = Math.max(0, 100 - (dist / 441.67 * 100));

            if(similarity < 65) gameOver();
            else showResult(similarity, r, g, b);
        }

        function updateSmartGauge(channel, targetVal, userVal) {
            document.getElementById(`${channel}-target`).innerText = targetVal;
            document.getElementById(`${channel}-user`).innerText = userVal;
            
            const diff = userVal - targetVal;
            const diffEl = document.getElementById(`${channel}-diff`);
            diffEl.innerText = diff > 0 ? `+${diff}` : diff;
            
            // 오차 태그 색상 (초과: 빨간색 계열, 부족: 파란색 계열, 일치: 초록색)
            if (diff > 0) {
                diffEl.className = "ml-2 px-1.5 py-0.5 rounded text-[10px] font-black bg-rose-100 text-rose-600";
            } else if (diff < 0) {
                diffEl.className = "ml-2 px-1.5 py-0.5 rounded text-[10px] font-black bg-indigo-100 text-indigo-600";
            } else {
                diffEl.className = "ml-2 px-1.5 py-0.5 rounded text-[10px] font-black bg-emerald-100 text-emerald-600";
            }

            // 게이지 바 채우기 (0~255 기준 비율)
            const barWidth = Math.min(Math.max((userVal / 255) * 100, 0), 100);
            document.getElementById(`${channel}-bar`).style.width = `${barWidth}%`;
            
            // 타겟 마커 위치
            const markerPos = (targetVal / 255) * 100;
            document.getElementById(`${channel}-marker`).style.left = `${markerPos}%`;
        }

        function showResult(sim, r, g, b) {
            gameState = "RESULT";
            const panel = document.getElementById('result-panel');
            panel.classList.remove('hidden');
            document.getElementById('mobile-action-btn').innerText = "CONTINUE";
            
            document.getElementById('similarity-text').innerText = `${sim.toFixed(1)}%`;
            
            // 직관적인 스마트 게이지 업데이트
            updateSmartGauge('r', targetColor.r, r);
            updateSmartGauge('g', targetColor.g, g);
            updateSmartGauge('b', targetColor.b, b);

            const badge = document.getElementById('status-badge');
            if(sim >= 95) { badge.innerText = "PERFECT"; badge.style.color = "#10b981"; score += 20; }
            else if(sim >= 85) { badge.innerText = "GREAT"; badge.style.color = "#6366f1"; score += 10; }
            else { badge.innerText = "GOOD"; badge.style.color = "#3b82f6"; score += 5; }
            
            document.getElementById('score-display').innerText = score;
            document.activeElement.blur();
        }

        function gameOver() {
            gameState = "OVER";
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('final-score-msg').innerText = `${score} PTS`;
            
            if(score > 0) {
                document.getElementById('rank-register-area').classList.remove('hidden');
                // 스마트 포커스: 점수가 있으면 자동으로 닉네임 입력창에 포커스 (Enter 입력 준비)
                setTimeout(() => document.getElementById('user-name').focus(), 100);
            }
        }

        // 스마트 엔터 키 핸들러 통합
        window.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                switch(gameState) {
                    case "HOME": startGame(); break;
                    case "PLAY": checkAnswer(); break;
                    case "RESULT": generateNewColor(); break;
                    case "OVER": 
                        const rankArea = document.getElementById('rank-register-area');
                        const nameInput = document.getElementById('user-name');
                        
                        // 랭킹 구역이 보이고, 이름이 비어있지 않은 상태에서 포커스 되어있다면 등록
                        if(!rankArea.classList.contains('hidden') && document.activeElement === nameInput && nameInput.value.trim() !== "") {
                            submitScore();
                        } else {
                            // 그 외의 경우 (점수가 0점이거나 이미 등록을 마쳤을 때) 재시작
                            location.reload(); 
                        }
                        break;
                }
            }
        });

        async function fetchRankings() {
            const list = document.getElementById('ranking-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = data.slice(0, 5).map((r, i) => `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="font-black text-slate-800"><span class="text-indigo-500 mr-2">#${i+1}</span> ${r.name}</span>
                        <span class="font-black text-slate-400 text-sm">${r.score}</span>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = '<p class="text-center text-slate-300 py-10 font-bold">Offline</p>'; }
        }

        async function submitScore() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SAVING...";
            btn.disabled = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, score, device: deviceId }) });
                // 완료 후 재시작 버튼으로 유도
                document.getElementById('rank-register-area').classList.add('hidden');
                document.getElementById('final-score-msg').innerText = "REGISTERED!";
                // 포커스 해제하여 다음 Enter 시 자연스럽게 RETRY 발동하도록 함
                document.activeElement.blur(); 
            } catch(e) { 
                btn.innerText = "REGISTER"; 
                btn.disabled = false;
            }
        }

        window.onload = fetchRankings;
    </script>
</body>
</html>
